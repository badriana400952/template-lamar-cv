<body>

    <div class="container">

        <h1>Email Lamaran Kerja</h1>

        <div class="form-group">

        <div class="form-group">

        </div>

        <div class="form-group">
            <label>Posisi</label>
            <select id="template">
                <option value="frontend">
                    Frontend Engineer
                </option>
                <option value="fullstack">
                    Fullstack Developer
                </option>
                <option value="golang">
                    Golang Developer
                </option>
            </select>
        </div>

        <div class="btn-group">
            <button class="preview-btn" onclick="generateEmail()">
                Preview
            </button>

            <button class="copy-btn" onclick="copyEmail()">
                Copy
            </button>

            <button id="sendBtn" class="send-btn" onclick="sendEmail()">
                Kirim
            </button>
        </div>

        <div class="preview" id="preview">
        </div>

    </div>

    <script>

        const TEMPLATE_ID = window.__ENV__.EMAILJS_TEMPLATE_ID;

            }

                return `Dear ${hrName},

            }


            if (type === "golang") {
                return `Dear ${hrName}, 
               Perkenalkan, saya Badriana, seorang Junior Golang Developer dengan pengalaman lebih dari 2+ tahun dalam pengembangan aplikasi web. Meskipun latar belakang saya lebih banyak berfokus pada frontend development, saya juga memiliki pengalaman membangun backend menggunakan Golang (Echo Framework) serta mengembangkan REST API dan mengelola database relasional melalui berbagai proyek pribadi maupun implementasi fullstack.

            }

        // ============================
        // PREVIEW
        // ============================

        function generateEmail() {

            const hrName =
                document.getElementById("hrName").value ||
                "HR Team";

            const type =
                document.getElementById("template").value;

            document.getElementById("preview").innerText =
                getTemplate(type, hrName);
        }

        // ============================
        // COPY
        // ============================

        function copyEmail() {

            const text =
                document.getElementById("preview").innerText;

            navigator.clipboard.writeText(text);

            alert("Email berhasil dicopy");
        }

        // ============================
        // SEND EMAIL
        // ============================

        async function sendEmail() {

            const email =
                document.getElementById("email").value.trim();

            if (!email) {
                alert("Email tujuan wajib diisi");
                return;
            }

            const hrName =
                document.getElementById("hrName").value ||
                "HR Team";

            const type =
                document.getElementById("template").value;

            const subject =
                type === "frontend"
                    ? "Application for Frontend Engineer Position - Badriana"
                    : type === "fullstack"
                        ? "Application for Fullstack Developer Position - Badriana"
                        : "Application for Junior Golang Developer Position - Badriana";
            const message =
                getTemplate(type, hrName);

            const btn =
                document.getElementById("sendBtn");

            btn.disabled = true;
            btn.innerText = "Mengirim...";

            try {

                const response = await emailjs.send(
                    SERVICE_ID,
                    TEMPLATE_ID,
                    {
                        to_email: email,
                        email: email,
                        recipient: email,
                        subject: subject,
                        message: message,
                        candidate_name: "Badriana"
                    }
                );
                console.log("EMAILJS RESPONSE:", response);
                alert("Email berhasil dikirim!");

            } catch (error) {

                console.error(error);
                alert(`
                    Status : ${error.status}
                    Pesan  : ${error.text}
                    `);
                alert(
                    "Gagal mengirim email. Cek Public Key, Template ID, dan Service ID."
                );

            } finally {

                btn.disabled = false;
                btn.innerText = "Kirim";
            }
        }

        // ============================
        // AUTO PREVIEW
        // ============================

        document
            .getElementById("template")
            .addEventListener(
                "change",
                generateEmail
            );

        document
            .getElementById("hrName")
            .addEventListener(
                "input",
                generateEmail
            );

        generateEmail();

    </script>

</body>

</html>
